# Notify gascity-hosted to rebuild the gc image when Go source changes.
#
# gascity provides the gc binary embedded in runtime images.
# When source code changes, images need rebuilding.
#
# Required secret: GASCITY_HOSTED_TOKEN — PAT with repo scope for
# gastownhall/gascity-hosted (needed for repository_dispatch).

name: Notify Image Rebuilds

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "scripts/**"
      - "contrib/**"
      - ".github/workflows/notify-image-build.yaml"
  workflow_dispatch:

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.GASCITY_HOSTED_TOKEN }}
          repository: gastownhall/gascity-hosted
          event-type: gc-binary-dep-updated
          client-payload: '{"repo": ${{ toJSON(github.repository) }}, "sha": ${{ toJSON(github.sha) }}}'
